#####################################################################
#   Macros
#####################################################################

[gcode_macro _HOME_Z]
gcode:
    # lower current before homing
    SET_TMC_CURRENT STEPPER=stepper_z CURRENT=0.4
    # use Revo PZ as TAP replacement
    PROBE METHOD=tap
    # home z
    G28 Z
    # move nozzle 10mm up
    G1 Z10
    # restore current to 1.1 amps
    SET_TMC_CURRENT STEPPER=stepper_z CURRENT=1.1

[gcode_macro PARK]
gcode:
    {% set th = printer.toolhead %}
    G0 X{th.axis_maximum.x//2} Y{th.axis_maximum.y//2} Z30  
   
[gcode_macro PRINT_START]
#   Use PRINT_START for the slicer starting script - please customise for your slicer of choice
gcode:
    # heat bed to 60
    M190 S60
    # heat nozzle to 220
    M109 S220
    # absolute positioning
    G90
    # homing 1
    G28
    # quad gantry level
    QUAD_GANTRY_LEVEL
    # create mesh
    BED_MESH_CLEAR
    BED_MESH_CALIBRATE METHOD=rapid_scan
    # absolute positioning
    G90
    # Park nozle in the middle of the bad
    PARK

[gcode_macro PRINT_END]
#   Use PRINT_END for the slicer ending script - please customise for your slicer of choice
gcode:
    # safe anti-stringing move coords
    {% set th = printer.toolhead %}
    {% set x_safe = th.position.x + 20 * (1 if th.axis_maximum.x - th.position.x > 20 else -1) %}
    {% set y_safe = th.position.y + 20 * (1 if th.axis_maximum.y - th.position.y > 20 else -1) %}
    {% set z_safe = [th.position.z + 2, th.axis_maximum.z]|min %}
    
    SAVE_GCODE_STATE NAME=STATE_PRINT_END

    M400                           ; wait for buffer to clear
    G92 E0                         ; zero the extruder
    G1 E-5.0 F1800                 ; retract filament
    
    TURN_OFF_HEATERS

    G90                                      ; absolute positioning
    G0 X{x_safe} Y{y_safe} Z{z_safe} F20000  ; move nozzle to remove stringing
    G0 X{th.axis_maximum.x//2} Y{th.axis_maximum.y - 2} F3600  ; park nozzle at rear
    M107                                     ; turn off fan
    
    BED_MESH_CLEAR

    # The purpose of the SAVE_GCODE_STATE/RESTORE_GCODE_STATE
    # command pair is to restore the printer's coordinate system
    # and speed settings since the commands above change them.
    # However, to prevent any accidental, unintentional toolhead
    # moves when restoring the state, explicitly set MOVE=0.
    RESTORE_GCODE_STATE NAME=STATE_PRINT_END MOVE=0

[gcode_macro MESH_FAST]
gcode:
  # homing
  G28
  # quad gantry level
  QUAD_GANTRY_LEVEL
  # create mesh
  BED_MESH_CALIBRATE METHOD=rapid_scan

[gcode_macro MESH_HOT]
gcode:
  # heat bed to 60
  M190 S60
  # heat nozzle to 220
  M109 S220
  # homing
  G28
  # quad gantry level
  QUAD_GANTRY_LEVEL
  # create mesh
  BED_MESH_CLEAR
  BED_MESH_CALIBRATE METHOD=rapid_scan
  # save config + klipper restart...
  SAVE_CONFIG

  # This macro automates a lot of the frequency mapping process and simplifies the steps significantly.
[gcode_macro PROBE_EDDY_CURRENT_CALIBRATE_AUTO]
gcode:
  BED_MESH_CLEAR
  G28 X Y
  G90 # Abs positioning
  G1 X{ printer.toolhead.axis_maximum.x/2 } Y{ printer.toolhead.axis_maximum.y/2 } F6000
  {% if 'z' not in printer.toolhead.homed_axes %}
    SET_KINEMATIC_POSITION Z={ printer.toolhead.axis_maximum.z-1 } # Allows the user to work it down until it touches.
  {% endif %}
  PROBE_EDDY_CURRENT_CALIBRATE CHIP=btt_eddy
